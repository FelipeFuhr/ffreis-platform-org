name: Terraform Plan

# Dry-run plan on every PR that touches Terraform or environment files.
# Posts plan output as a PR comment.  No apply — read-only.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "stack/**"
      - "envs/**"
      - ".github/workflows/terraform-plan.yml"

concurrency:
  group: terraform-plan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write        # Required for OIDC token exchange
  contents: read
  pull-requests: write   # Required to post plan comment

jobs:
  plan-prod:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-plan.yml@main
    with:
      environment: "prod"
      chdir: "stack"
    secrets: inherit
